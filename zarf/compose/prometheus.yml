global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: tetra
    static_configs:
      - targets: ['tetra:3010']

  - job_name: tetra-worker
    static_configs:
      - targets: ['worker:3010']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
